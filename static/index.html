<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能OnCall助手</title>
    <link rel="stylesheet" href="/static/styles.css">
    <!-- Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <!-- 代码高亮库（可选） -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/highlight.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">智能OnCall助手</h2>
            </div>
            
            <div class="sidebar-content">
                <button class="new-chat-btn" id="newChatBtn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span>新建对话</span>
                </button>
                
                <div class="chat-history-section">
                    <div class="history-header">
                        <span>近期对话</span>
                    </div>
                    <div class="chat-history-list" id="chatHistoryList">
                        <!-- 历史对话列表将在这里动态生成 -->
                    </div>
                </div>
                
            </div>
        </aside>

        <!-- 主内容区域 -->
        <main class="main-content">
            <button class="hamburger-btn" id="hamburgerBtn" title="菜单">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button class="ai-ops-top-btn" id="aiOpsSidebarBtn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>AI Ops</span>
            </button>
            <button class="feishu-top-btn" id="feishuBtn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 13.5997 2.37562 15.1116 3.04346 16.4525C3.22094 16.8088 3.28001 17.2161 3.17712 17.6006L2.58151 19.8267C2.32295 20.793 3.20701 21.677 4.17335 21.4185L6.39939 20.8229C6.78393 20.72 7.19121 20.7791 7.54753 20.9565C8.88837 21.6244 10.4003 22 12 22Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M8 10L12 14L16 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>飞书</span>
            </button>
            <div class="chat-container">
                <div class="drop-overlay" id="dropOverlay">
                    <div class="drop-overlay-content">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 16V4M12 4L8 8M12 4L16 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M4 16V18C4 19.1046 4.89543 20 6 20H18C19.1046 20 20 19.1046 20 18V16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <span class="drop-overlay-text">释放文件以上传到知识库</span>
                        <span class="drop-overlay-subtext">支持 TXT / Markdown / PDF / Word</span>
                    </div>
                </div>
                <div class="welcome-greeting" id="welcomeGreeting">
                    <p>你好！我是智能Oncall小助手</p>
                </div>
                <div class="chat-messages" id="chatMessages">
                </div>
                
                <div class="chat-input-container">
                    <div class="input-group-wrapper">
                        <div class="input-wrapper">
                            <textarea id="messageInput" placeholder="问问智能OnCall助手" maxlength="1000" class="message-input" rows="1"></textarea>
                            <div class="input-bottom-bar">
                                <div class="tools-btn-wrapper">
                                    <button class="tools-btn" id="toolsBtn" title="更多选项">
                                        <svg class="tools-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                                            <circle cx="19" cy="12" r="1.5" fill="currentColor"/>
                                            <circle cx="5" cy="12" r="1.5" fill="currentColor"/>
                                        </svg>
                                    </button>
                                    <div class="tools-menu" id="toolsMenu">
                                        <div class="tools-menu-item" id="uploadFileItem">
                                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                            </svg>
                                            <span>上传文件</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="right-actions">
                                    <div class="mode-selector-wrapper">
                                        <button class="mode-selector-btn" id="modeSelectorBtn">
                                            <span id="currentModeText">快速</span>
                                            <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                            </svg>
                                        </button>
                                        <div class="mode-dropdown" id="modeDropdown">
                                            <div class="dropdown-header">选择对话方式</div>
                                            <div class="dropdown-item active" data-mode="quick">
                                                <div class="dropdown-item-main">
                                                    <span>快速</span>
                                                    <span class="badge-new">新</span>
                                                </div>
                                                <div class="dropdown-item-sub">快速对话</div>
                                            </div>
                                            <div class="dropdown-item" data-mode="stream">
                                                <div class="dropdown-item-main">
                                                    <span>流式</span>
                                                </div>
                                                <div class="dropdown-item-sub">流式对话</div>
                                            </div>
                                        </div>
                                    </div>
                                    <button class="send-btn-circle" id="sendButton" title="发送">
                                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="fileInput" accept=".txt,.md,.markdown,.pdf,.docx,.pptx" style="display: none;">
                </div>
            </div>
        </main>
    </div>

    <!-- 加载遮罩层 -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">智能运维分析中，请稍候...</div>
            <div class="loading-subtext">后端正在处理，请耐心等待</div>
        </div>
    </div>

    <!-- 飞书消息发送模态框 -->
    <div id="feishuModal" class="feishu-modal">
        <div class="feishu-modal-backdrop" id="feishuModalBackdrop"></div>
        <div class="feishu-modal-dialog">
            <div class="feishu-modal-header">
                <div class="feishu-modal-header-left">
                    <h3>飞书群消息</h3>
                    <div class="feishu-tab-nav">
                        <button class="feishu-nav-tab active" data-panel="send">发送消息</button>
                        <button class="feishu-nav-tab" data-panel="alerts">告警监控</button>
                    </div>
                </div>
                <button class="feishu-modal-close" id="feishuModalClose">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>

            <!-- 发送消息面板 -->
            <div class="feishu-panel active" id="feishuSendPanel">
                <div class="feishu-modal-body">
                    <div class="feishu-form-group">
                        <label>目标群聊</label>
                        <input type="text" value="chase (oc_1e24a302...)" disabled class="feishu-chat-display">
                    </div>
                    <div class="feishu-form-group">
                        <label>消息类型</label>
                        <div class="feishu-tabs">
                            <button class="feishu-tab active" data-tab="text">文本消息</button>
                            <button class="feishu-tab" data-tab="card">卡片消息</button>
                        </div>
                    </div>
                    <div class="feishu-tab-content" id="tabText">
                        <textarea id="feishuTextInput" placeholder="输入消息内容..." maxlength="15000" rows="4"></textarea>
                    </div>
                    <div class="feishu-tab-content hidden" id="tabCard">
                        <input type="text" id="feishuCardTitle" placeholder="卡片标题" maxlength="200">
                        <select id="feishuCardLevel">
                            <option value="info">ℹ️ 信息 (info)</option>
                            <option value="warning" selected>⚠️ 警告 (warning)</option>
                            <option value="error">🔴 错误 (error)</option>
                            <option value="critical">🟣 严重 (critical)</option>
                        </select>
                        <textarea id="feishuCardContent" placeholder="卡片内容（支持 Markdown）" rows="5"></textarea>
                    </div>
                </div>
                <div class="feishu-modal-footer">
                    <span class="feishu-modal-status" id="feishuStatus"></span>
                    <button class="feishu-cancel-btn" id="feishuCancelBtn">取消</button>
                    <button class="feishu-send-btn" id="feishuSendBtn">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        发送
                    </button>
                </div>
            </div>

            <!-- 告警监控面板 -->
            <div class="feishu-panel" id="feishuAlertsPanel">
                <div class="feishu-modal-body">
                    <div class="alert-monitor-header">
                        <div class="alert-monitor-title">自动告警监控</div>
                        <label class="alert-toggle">
                            <input type="checkbox" id="alertToggle" checked>
                            <span class="alert-toggle-slider"></span>
                        </label>
                    </div>
                    <div class="alert-monitor-info" id="alertMonitorInfo">
                        <span>状态: 运行中</span>
                        <span>检查间隔: 60s</span>
                        <span>上次检查: -</span>
                    </div>
                    <div class="alert-monitor-section">
                        <div class="alert-section-title">当前活跃告警 <span class="alert-count-badge" id="alertCountBadge">0</span></div>
                        <div class="alert-list" id="currentAlertList">
                            <div class="alert-empty">暂无活跃告警</div>
                        </div>
                    </div>
                    <div class="alert-monitor-section">
                        <div class="alert-section-title">最近告警记录</div>
                        <div class="alert-history-list" id="alertHistoryList">
                            <div class="alert-empty">暂无记录</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
